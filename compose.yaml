services:
  laravel.test:
    build:
      context: .
      dockerfile: vendor/laravel/sail/runtimes/8.5/Dockerfile
      args:
        WWWGROUP: '${WWWGROUP}'
    image: sail-8.5/app
    container_name: theforgeapi
    ports:
      - '${APP_PORT:-8000}:80'
    environment:
      WWWUSER: '${WWWUSER}'
      LARAVEL_SAIL: 1
    volumes:
      - '.:/var/www/html'
    networks:
      - forge
    depends_on:
      - mysql

  mysql:
    image: mysql:8.4
    container_name: theforgeapi-mysql
    restart: unless-stopped
    ports:
      - '${FORWARD_DB_PORT:-3306}:3306'
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: theforgeapi
      MYSQL_USER: sail
      MYSQL_PASSWORD: password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - forge

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: theforgeapi-phpmyadmin
    restart: unless-stopped
    ports:
      - '8080:80'
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: sail
      PMA_PASSWORD: password
      PMA_ARBITRARY: 1
    depends_on:
      - mysql
    networks:
      - forge

networks:
  forge:
    driver: bridge

volumes:
  mysql_data: